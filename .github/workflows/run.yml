name: Check for schedule updates

on:
  schedule:
    - cron:  '*/15 * * * *'
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Cache Google Chrome
      uses: actions/cache@v5
      with:
        path: /opt/hostedtoolcache/setup-chrome
        key: ${{ runner.os }}-chrome-stable-${{ hashFiles('build.gradle.kts') }}
        restore-keys: |
          ${{ runner.os }}-chrome-stable-
    - name: Install Google Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable
    - name: Cache Selenium webdriver
      uses: actions/cache@v5
      with:
        path: ~/.cache/selenium
        key: ${{ runner.os }}-selenium-${{ hashFiles('~/.cache/selenium') }}
        restore-keys: |
          ${{ runner.os }}-selenium-

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
    - name: Log files before run
      shell: bash
      run: |
        pwd
        ls -las .
        ls -las .days
        ls -las ~/.cache/selenium/ || echo "not found: ~/.cache/selenium/"
    - name: Run check
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: ./gradlew run --info
    - name: Log results
      shell: bash
      run: |
        pwd
        ls -las .
        ls -las .days
        ls -las ~/.cache/selenium/ || echo "not found: ~/.cache/selenium/"
    - name: Commit update data
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        file_pattern: '.days/*.json'
        commit_message: "Update schedule"
        skip_fetch: true
        skip_checkout: true
    - uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: test-report
        retention-days: 7
        path: |
          **/build/reports
          **/build/test-results
